# ============================================================
#  Configuration de build du client MemeBomb (electron-builder)
#  Build :  npm install  &&  npm run dist   → client/dist/MemeBomb-Setup-x.y.z.exe
# ============================================================
appId: com.memebomb.client
productName: MemeBomb
copyright: MIT © MemeBomb

# Publication des releases sur GitHub (npm run release, avec GH_TOKEN défini).
# Le client vérifie github.com/YvigUnderscore/MemeBomb/releases/latest au démarrage.
publish:
  provider: github
  owner: YvigUnderscore
  repo: MemeBomb

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - "!**/*.map"

# Métadonnées qui réduisent les faux-positifs antivirus (exe décrit et cohérent).
win:
  icon: build/icon.png   # electron-builder génère automatiquement le .ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "MemeBomb-Setup-${version}.${ext}"
  # Ajoutez ici votre certificat pour signer (fortement recommandé, cf docs/CLIENT.md) :
  # certificateFile: build/cert.pfx
  # certificatePassword: ${env.CSC_KEY_PASSWORD}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MemeBomb

# Pas de compression maximale (les binaires compressés type UPX déclenchent les AV).
compression: normal
